version: "3.9"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL — User metadata, org data, RBAC
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lexos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lexos
      POSTGRES_PASSWORD: lexos_secret
      POSTGRES_DB: lexos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexos -d lexos_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Neo4j — Legal Knowledge Graph
  # ─────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: lexos-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/lexos_graph_secret
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────
  # ChromaDB — Vector store for RAG / embeddings
  # ─────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.6.3
    container_name: lexos-chromadb
    restart: unless-stopped
    environment:
      ANONYMIZED_TELEMETRY: "false"
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # LexOS Backend — FastAPI API Gateway
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lexos-backend
    restart: unless-stopped
    environment:
      # PostgreSQL
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: lexos
      POSTGRES_PASSWORD: lexos_secret
      POSTGRES_DB: lexos_db
      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: lexos_graph_secret
      # ChromaDB
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_healthy

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  chroma_data:

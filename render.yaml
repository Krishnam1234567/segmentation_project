services:
  - type: web
    name: lexos-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: "https://krishnam1234567.github.io"
      - key: PYTHON_VERSION
        value: "3.12.0"
